name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] pytest-cov
      - name: Run tests with coverage
        run: pytest --cov=attrimotif --cov-report=term-missing
      - name: Run all illustrative examples end to end
        run: python examples/run_all.py

  optional-backend:
    # Hard verification that the optional netrd backend installs and that the
    # builtin Portrait Divergence agrees with it on identity and ordering
    # (numerical k-binning differences are expected and are not asserted equal).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install with the netrd backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] netrd
      - name: Portrait Divergence parity test (netrd required, no skip)
        run: pytest tests/test_compare.py -k netrd -v
